# ibookjoy Nginx 配置片段
#
# 将以下 location 块添加到 smartwingtech.com 站点的 Nginx 配置中
# 宝塔面板路径：网站 → smartwingtech.com → 配置文件
# 或直接编辑：/www/server/panel/vhost/nginx/smartwingtech.com.conf
#
# ⚠️ 将此块插入到该文件的 server {} 块内，
#    放在最后一个 location 块之前（通常在 location / {} 之前）。

    # ── ibookjoy 静态站点 ──────────────────────────────────────
    location /ibookjoy {
        alias /www/wwwroot/ibookjoy;
        index index.html;
        # 先匹配文件，再匹配目录下的 index.html，最后回退到子路径首页
        try_files $uri $uri/ $uri/index.html /ibookjoy/index.html;
    }

    location /ibookjoy/ {
        alias /www/wwwroot/ibookjoy/;
        index index.html;
        try_files $uri $uri/ $uri/index.html /ibookjoy/index.html;
    }
    # ──────────────────────────────────────────────────────────
